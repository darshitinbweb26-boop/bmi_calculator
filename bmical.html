<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional BMI Calculator</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        h2 { color: #333; }
        .input-group { margin: 15px 0; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover { background-color: #218838; }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
        }
        .bmi-value { font-size: 24px; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>BMI Calculator</h2>
    
    <div class="input-group">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 70" step="0.1">
    </div>

    <div class="input-group">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" placeholder="e.g. 175">
    </div>

    <button onclick="calculateBMI()">Calculate BMI</button>

    <div id="result">
        <span id="bmi-text" class="bmi-value"></span>
        <span id="category-text"></span>
    </div>
</div>

<script>
    function calculateBMI() {
        const weight = document.getElementById('weight').value;
        const heightCm = document.getElementById('height').value;
        const resultDiv = document.getElementById('result');
        const bmiText = document.getElementById('bmi-text');
        const categoryText = document.getElementById('category-text');

        if (weight > 0 && heightCm > 0) {
            const heightM = heightCm / 100;
            const bmi = (weight / (heightM * heightM)).toFixed(1);
            
            resultDiv.style.display = 'block';
            bmiText.innerHTML = bmi;

            let category = "";
            let color = "";

            if (bmi < 18.5) {
                category = "Underweight";
                color = "#ffc107";
            } else if (bmi < 25) {
                category = "Normal Weight";
                color = "#28a745";
            } else if (bmi < 30) {
                category = "Overweight";
                color = "#fd7e14";
            } else {
                category = "Obese";
                color = "#dc3545";
            }

            categoryText.innerHTML = category;
            resultDiv.style.backgroundColor = color + "22"; // Light tint
            resultDiv.style.color = color;
            resultDiv.style.border = `1px solid ${color}`;
        } else {
            alert("Please enter valid positive numbers for weight and height.");
        }
    }
</script>

</body>
</html>
